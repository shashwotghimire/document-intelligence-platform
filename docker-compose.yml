services:
  api:
    build:
      context: ./api
    container_name: documentgpt-api
    ports:
      - "8080:8080"
    env_file:
      - ./api/.env

  web:
    build:
      context: ./web
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    container_name: documentgpt-web
    ports:
      - "5173:80"
    depends_on:
      - api
